name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Test
        run: |
          go test ./...
          go vet ./...
      - name: Build release packages
        run: bash scripts/build_release.sh "${GITHUB_REF_NAME}"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" dist/*
          --title "Agent-Bridge ${GITHUB_REF_NAME}"
          --generate-notes
